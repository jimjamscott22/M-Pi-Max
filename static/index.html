<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>M-Pi-Max</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 1.5rem;
    }

    h1 {
      font-size: 1.4rem;
      color: #a78bfa;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 1rem;
    }

    .card h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 0.75rem;
    }

    .stat {
      font-size: 1.6rem;
      font-weight: bold;
      color: #a78bfa;
    }

    .sub {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.25rem;
    }

    .bar-wrap {
      background: #2a2a2a;
      border-radius: 4px;
      height: 8px;
      margin-top: 0.5rem;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      border-radius: 4px;
      background: #a78bfa;
      transition: width 0.4s ease;
    }

    .bar.hot { background: #f87171; }
    .bar.warm { background: #fb923c; }

    canvas { margin-top: 0.75rem; }

    #uptime-card .stat { font-size: 1.1rem; }

    .throttle-ok  { color: #4ade80; }
    .throttle-bad { color: #f87171; }
  </style>
</head>
<body>
  <h1>M-Pi-Max</h1>

  <div class="grid">

    <div class="card" id="cpu-card">
      <h2>CPU Usage</h2>
      <div class="stat" id="cpu-percent">--</div>
      <div class="sub" id="cpu-freq">--</div>
      <div class="bar-wrap"><div class="bar" id="cpu-bar" style="width:0%"></div></div>
      <canvas id="cpu-chart" height="80"></canvas>
    </div>

    <div class="card">
      <h2>CPU Temperature</h2>
      <div class="stat" id="cpu-temp">--</div>
      <div class="sub" id="cpu-throttle">--</div>
      <div class="bar-wrap"><div class="bar" id="temp-bar" style="width:0%"></div></div>
    </div>

    <div class="card">
      <h2>Memory</h2>
      <div class="stat" id="mem-percent">--</div>
      <div class="sub" id="mem-detail">--</div>
      <div class="bar-wrap"><div class="bar" id="mem-bar" style="width:0%"></div></div>
    </div>

    <div class="card">
      <h2>Swap</h2>
      <div class="stat" id="swap-percent">--</div>
      <div class="sub" id="swap-detail">--</div>
      <div class="bar-wrap"><div class="bar" id="swap-bar" style="width:0%"></div></div>
    </div>

    <div class="card">
      <h2>Disk (/ partition)</h2>
      <div class="stat" id="disk-percent">--</div>
      <div class="sub" id="disk-detail">--</div>
      <div class="bar-wrap"><div class="bar" id="disk-bar" style="width:0%"></div></div>
    </div>

    <div class="card">
      <h2>Network (total since boot)</h2>
      <div class="stat" id="net-recv">--</div>
      <div class="sub">received</div>
      <div class="stat" id="net-sent" style="margin-top:0.5rem">--</div>
      <div class="sub">sent</div>
    </div>

    <div class="card" id="uptime-card">
      <h2>Uptime</h2>
      <div class="stat" id="uptime">--</div>
      <div class="sub" id="load-avg">load avg: --</div>
    </div>

  </div>

  <script>
    // --- Chart.js rolling history for CPU ---
    // We keep the last 30 data points (30 seconds at 1s polling)
    const MAX_POINTS = 30;
    const labels = Array(MAX_POINTS).fill("");
    const cpuHistory = Array(MAX_POINTS).fill(0);

    const cpuChart = new Chart(document.getElementById("cpu-chart"), {
      type: "line",
      data: {
        labels,
        datasets: [{
          data: cpuHistory,
          borderColor: "#a78bfa",
          backgroundColor: "rgba(167,139,250,0.1)",
          borderWidth: 1.5,
          pointRadius: 0,
          fill: true,
          tension: 0.3,
        }]
      },
      options: {
        animation: false,
        scales: {
          x: { display: false },
          y: { min: 0, max: 100, display: false }
        },
        plugins: { legend: { display: false } }
      }
    });

    // --- Helpers ---

    function setBar(id, percent, thresholds = [70, 90]) {
      const bar = document.getElementById(id);
      bar.style.width = percent + "%";
      bar.className = "bar";
      if (percent >= thresholds[1]) bar.classList.add("hot");
      else if (percent >= thresholds[0]) bar.classList.add("warm");
    }

    // --- Main polling loop ---
    // fetch() is the modern browser API for making HTTP requests.
    // We call our /stats endpoint every second and update the page.

    async function update() {
      try {
        const res = await fetch("/stats");
        const d = await res.json();

        // CPU
        const cpuPct = d.cpu.percent;
        document.getElementById("cpu-percent").textContent = cpuPct + "%";
        document.getElementById("cpu-freq").textContent =
          d.cpu.freq_mhz ? d.cpu.freq_mhz + " MHz" : "";
        setBar("cpu-bar", cpuPct);

        // Rolling chart — shift the oldest value out, push the new one in
        cpuHistory.shift();
        cpuHistory.push(cpuPct);
        cpuChart.update();

        // Temperature
        const temp = d.cpu.temp_c;
        if (temp !== null) {
          document.getElementById("cpu-temp").textContent = temp + " °C";
          // Map 30–85°C to 0–100% for the bar
          const tempPct = Math.min(100, Math.max(0, ((temp - 30) / 55) * 100));
          setBar("temp-bar", tempPct, [60, 80]);
        }

        // Throttle — 0x0 means all clear
        const throttleEl = document.getElementById("cpu-throttle");
        if (d.cpu.throttled === "unavailable") {
          throttleEl.textContent = "vcgencmd unavailable";
          throttleEl.className = "sub";
        } else if (d.cpu.throttled === "0x0") {
          throttleEl.textContent = "no throttling";
          throttleEl.className = "sub throttle-ok";
        } else {
          throttleEl.textContent = "throttled: " + d.cpu.throttled;
          throttleEl.className = "sub throttle-bad";
        }

        // Memory
        document.getElementById("mem-percent").textContent = d.memory.percent + "%";
        document.getElementById("mem-detail").textContent =
          `${d.memory.used_gb} / ${d.memory.total_gb} GB`;
        setBar("mem-bar", d.memory.percent);

        // Swap
        document.getElementById("swap-percent").textContent = d.swap.percent + "%";
        document.getElementById("swap-detail").textContent =
          `${d.swap.used_gb} / ${d.swap.total_gb} GB`;
        setBar("swap-bar", d.swap.percent);

        // Disk
        document.getElementById("disk-percent").textContent = d.disk.percent + "%";
        document.getElementById("disk-detail").textContent =
          `${d.disk.used_gb} / ${d.disk.total_gb} GB`;
        setBar("disk-bar", d.disk.percent);

        // Network
        document.getElementById("net-recv").textContent = d.network.recv_mb + " MB";
        document.getElementById("net-sent").textContent = d.network.sent_mb + " MB";

        // Uptime + load
        document.getElementById("uptime").textContent = d.system.uptime;
        document.getElementById("load-avg").textContent =
          "load avg: " + d.system.load_avg.join(" / ");

      } catch (err) {
        console.error("Failed to fetch stats:", err);
      }
    }

    // Run once immediately, then every second
    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
